name: image-build-test-publish

on:
  pull_request:
    paths:
      - "images/image1/**"
      - "scripts/**"
      - ".github/workflows/image-build-test-publish.yml"
  push:
    branches:
      - main
    paths:
      - "images/image1/**"
      - "scripts/**"
      - ".github/workflows/image-build-test-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/es-ce-testing-portfolio/edp-custom-image
  DOCKERFILE_PATH: images/image1/DockerFile
  BUILD_CONTEXT: images/image1
  LOCAL_IMAGE_TAG: local/custom-image:ci

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for validation
        run: docker build --progress=plain -f "${DOCKERFILE_PATH}" -t "${LOCAL_IMAGE_TAG}" "${BUILD_CONTEXT}"

      - name: Validate image
        shell: pwsh
        run: .\scripts\test-image.ps1 -ImageTag "${env:LOCAL_IMAGE_TAG}"

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
